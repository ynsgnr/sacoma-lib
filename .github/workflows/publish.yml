name: Publish to PyPI

# Publishes sacoma-lib to PyPI when a GitHub Release is published, using PyPI
# Trusted Publishing (OIDC) — no API token needed. Configure the trusted
# publisher on PyPI for project "sacoma-lib": owner ynsgnr, repo sacoma-lib,
# workflow publish.yml, environment pypi. Bump the version in pyproject.toml,
# tag it, and publish a Release to trigger this.

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check sacoma tests
      - run: pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
